version = 1

# ---------------------------------------------------------------------------
# Stichting Badge.Team website — REUSE / SPDX metadata (spec 3.3)
#
# Buckets:
#   * Code (theme, config, scripts, tooling) .......... MIT
#   * Content (docs, blog, own images, badge art) ..... CC-BY-4.0
#   * Third-party sponsor logos ....................... per-owner LicenseRef-*
#   * Third-party component datasheets ................ per-owner LicenseRef-*
# ---------------------------------------------------------------------------

# ---- Code: Hugo theme, layouts, styles, config, tooling (MIT) -------------
[[annotations]]
path = [
    "layouts/**",
    "assets/scss/**",
    "build.sh",
    "config.toml",
    "data/**",
    "go.mod",
    "go.sum",
    "package.json",
    "package-lock.json",
    "README.md",
    ".github/**",
    ".vscode/**",
    ".cspell/**",
    ".gitignore",
    ".gitmodules",
]
SPDX-FileCopyrightText = "Stichting Badge.Team"
SPDX-License-Identifier = "MIT"

# ---- Root license file (the CC-BY-4.0 text itself) ------------------------
[[annotations]]
path = "LICENSE"
SPDX-FileCopyrightText = "Stichting Badge.Team"
SPDX-License-Identifier = "CC-BY-4.0"

# ---- Content: documentation, blog, own images and badge artwork (CC-BY) ---
[[annotations]]
path = [
    "content/**",
    "static/**",
    "assets/icons/**",
]
SPDX-FileCopyrightText = "Stichting Badge.Team"
SPDX-License-Identifier = "CC-BY-4.0"

# ---- Web flasher: browser code, not prose (MIT, like the rest of our code) --
[[annotations]]
path = "static/flash/**"
precedence = "override"
SPDX-FileCopyrightText = "Stichting Badge.Team"
SPDX-License-Identifier = "MIT"

# ---------------------------------------------------------------------------
# Flashable firmware images served by /flash/. These are build artefacts of
# the badge firmware projects, redistributed here so the browser flasher can
# fetch them same-origin; they are not our content.
# ---------------------------------------------------------------------------
[[annotations]]
path = "static/firmware/cyber-aegg/**"
precedence = "override"
SPDX-FileCopyrightText = "CyberÆgg badge firmware contributors"
SPDX-License-Identifier = "Apache-2.0"


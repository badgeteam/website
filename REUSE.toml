version = 1

# ---------------------------------------------------------------------------
# Stichting Badge.Team website — REUSE / SPDX metadata (spec 3.3)
#
# Buckets:
#   * Code (theme, config, scripts, tooling) .......... MIT
#   * Content (docs, blog, own images, badge art) ..... CC-BY-4.0
#   * Third-party sponsor logos ....................... per-owner LicenseRef-*
#   * Third-party component datasheets ................ per-owner LicenseRef-*
# ---------------------------------------------------------------------------

# ---- Code: Hugo theme, layouts, styles, config, tooling (MIT) -------------
[[annotations]]
path = [
    "layouts/**",
    "assets/scss/**",
    "build.sh",
    "config.toml",
    "data/**",
    "go.mod",
    "go.sum",
    "package.json",
    "package-lock.json",
    "README.md",
    ".github/**",
    ".vscode/**",
    ".cspell/**",
    ".gitignore",
    ".gitmodules",
]
SPDX-FileCopyrightText = "Stichting Badge.Team"
SPDX-License-Identifier = "MIT"

# ---- Root license file (the CC-BY-4.0 text itself) ------------------------
[[annotations]]
path = "LICENSE"
SPDX-FileCopyrightText = "Stichting Badge.Team"
SPDX-License-Identifier = "CC-BY-4.0"

# ---- Content: documentation, blog, own images and badge artwork (CC-BY) ---
[[annotations]]
path = [
    "content/**",
    "static/**",
    "assets/icons/**",
]
SPDX-FileCopyrightText = "Stichting Badge.Team"
SPDX-License-Identifier = "CC-BY-4.0"

# ---- Web flasher: browser code, not prose (MIT, like the rest of our code) --
[[annotations]]
path = "static/flash/**"
precedence = "override"
SPDX-FileCopyrightText = "Stichting Badge.Team"
SPDX-License-Identifier = "MIT"

# ---------------------------------------------------------------------------
# Flashable firmware images served by /flash/. These are build artefacts of
# the badge firmware projects, redistributed here so the browser flasher can
# fetch them same-origin; they are not our content.
# ---------------------------------------------------------------------------
[[annotations]]
path = "static/firmware/cyber-aegg/**"
precedence = "override"
SPDX-FileCopyrightText = "CyberÆgg badge firmware contributors"
SPDX-License-Identifier = "Apache-2.0"

# The DOOM image is a different beast: it links the prBoom / next-hack DOOM
# engine, so the linked binary is GPL rather than Apache-2.0.
# The CircuitPython image is mostly the CircuitPython/MicroPython core (MIT),
# with the badge port and its patches from the cyberaegg-circuitpython project
# (Apache-2.0) built in.
[[annotations]]
path = "static/firmware/cyber-aegg/cyberaegg-circuitpython.bin"
precedence = "override"
SPDX-FileCopyrightText = "Adafruit Industries, the CircuitPython and MicroPython contributors, and the CyberÆgg CircuitPython contributors"
SPDX-License-Identifier = "MIT AND Apache-2.0"

[[annotations]]
path = "static/firmware/cyber-aegg/cyber-aegg-doom.bin"
precedence = "override"
SPDX-FileCopyrightText = "2026 Kristian Vlaardingerbroek, id Software LLC and the prBoom, GBADoom and next-hack contributors"
SPDX-License-Identifier = "GPL-2.0-or-later"

# ---------------------------------------------------------------------------
# DOOM game data. Derived from the freely distributable shareware episode and
# offered so badge owners can load the game onto their own hardware; it is not
# ours and is not covered by the project's licenses. See the LicenseRef text.
# ---------------------------------------------------------------------------
[[annotations]]
path = "static/doom/**"
precedence = "override"
SPDX-FileCopyrightText = "id Software LLC"
SPDX-License-Identifier = "LicenseRef-DoomShareware"

# Asset payloads for the badge's USB drive, built from assets/to-badge/ in the
# respective firmware repositories.
#
# NOTE on the standard archive: besides the project's own artwork it embeds 16
# sponsor slides (030000–03000F) reproducing the logos of the BornHack and
# badge sponsors. Those remain the trademarks of their respective owners and
# are redistributed here, as in the firmware project, with their permission —
# the identifier below covers the archive as a whole, not the sponsors' marks.
[[annotations]]
path = "static/assets/cyber-aegg/cyber-aegg-assets.zip"
precedence = "override"
SPDX-FileCopyrightText = "CyberÆgg badge firmware contributors and the BornHack badge sponsors"
SPDX-License-Identifier = "Apache-2.0"

# CircuitPython support libraries for the CIRCUITPY drive: the badge's own
# drivers (Apache-2.0) alongside Adafruit's display_text and the micropySX126X
# radio driver, both MIT.
[[annotations]]
path = "static/assets/cyber-aegg/cyberaegg-circuitpython-lib.zip"
precedence = "override"
SPDX-FileCopyrightText = "The CyberÆgg CircuitPython contributors, Adafruit Industries, E H Ong and Jan Gromeš"
SPDX-License-Identifier = "MIT AND Apache-2.0"

# The Community Edition archive carries no sponsor slides — own artwork only.
[[annotations]]
path = "static/assets/cyber-aegg/cyber-aegg-community-assets.zip"
precedence = "override"
SPDX-FileCopyrightText = "CyberÆgg badge firmware contributors"
SPDX-License-Identifier = "Apache-2.0"


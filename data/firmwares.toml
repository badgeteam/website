# Registry for the in-browser WebUSB firmware flasher (/flash/).
#
# Consumed by layouts/_shortcodes/flasher.html, which serialises this file
# to JSON into the page; static/flash/flasher.js reads it from there. There
# is no backend and no runtime fetch of an index — adding a badge or an
# image here is the only step needed.
#
# Firmware images must be served from this site (same origin). Cross-origin
# downloads are blocked unless the host sends CORS headers, and neither
# Codeberg nor GitHub release assets do for arbitrary origins. Put the file
# in static/firmware/<badge-id>/ and reference it by its site-absolute path.
#
# USB IDs are strings because TOML has no hex integer literal; flasher.js
# parses them with parseInt(..., 16).
#
# A firmware entry may also carry `wad = true`, meaning its game data is not
# on the FAT12 drive but in the badge's QSPI flash, uploaded over serial from
# the WAD loader page rather than by the asset step.

[[badge]]
id = "cyber-aegg"
name = "BornHack 2026 — Cyber Ægg"
docsUrl = "/docs/badges/bornhack-2026/"
# Shown when a connected badge turns out to be running the app, not the
# bootloader. Rendered as HTML.
dfuHint = "Unplug the badge, hold <strong>Execute</strong>, and plug it back in — the LED blinks red in DFU mode."
# One nRF52840 flash page. Source: bootloader/src/dfu.rs.
blockSize = 4096
# Bootloader identity in DFU mode (bootloader/src/dfu.rs).
bootloaderVid = "0x1915"
bootloaderPid = "0x521f"
# App-firmware identity — listed only so the badge still shows up in the
# browser's device chooser when it is not in DFU mode, which lets us tell
# the user *why* they cannot flash yet.
appVid = "0x1209"
appPid = "0x0001"

  [[badge.firmware]]
  label = "Cyber Ægg application (release)"
  # Built with `make fw-bin-release` in Ranzbak/bornhack-firmware-2026,
  # from main @ 392ed6d (2026-07-21).
  file = "/firmware/cyber-aegg/cyber-aegg.bin"
  # Optional integrity check — verified in the browser before writing.
  # Generate with: sha256sum <file>
  sha256 = "9d23b50eab3797b49e632e97c159a8416168e6853bcd43fc9f685aab1ffe0004"
  notes = "The normal badge firmware: BornPets, mesh, clock and calendar."

  # Asset payload for the badge's USB drive, tied to this image — editions
  # ship different sprite sets, so flashing one and installing the other's
  # assets leaves gaps. Built from assets/to-badge/ in the firmware
  # repository:  cd assets/to-badge && zip -rX -9 <out>.zip .
  # Flat deflate entries only — static/flash/assets.js unpacks it in the
  # browser with DecompressionStream and cannot handle zip64.
  [badge.firmware.assets]
  file = "/assets/cyber-aegg/cyber-aegg-assets.zip"
  sha256 = "92bd4c269feb7988cf7855e863f06a8ce9b1a87203233382cacec078a594df77"
  label = "171 files — pet sprites, sponsor slides, menu icons and the BornHack programme."

  [[badge.firmware]]
  label = "Cyber Ægg Community Edition (release)"
  # The Community Edition lives at
  # https://github.com/ShadowSquad-org/BornHack-Cyberegg
  #
  # Built from v0.2.0 @ 4604c1b (2026-07-21). The edition is developed on
  # the annejan fork and synced upstream in batches, so this is ahead of
  # ShadowSquad-org/main (6e046b8) by seven commits — the screen lock and
  # the battle fighter names. Take new builds from the fork's main.
  file = "/firmware/cyber-aegg/cyber-aegg-community.bin"
  sha256 = "9d80eeff4cb95a716812936763ed6cfa12812faaaa83e1358ce21c5d300b226e"
  notes = "A community fork of the badge firmware. Everything the standard image does, plus extra BornPets mechanics: weight and exercise, food and drink choices, the HAX in-game economy, mesh Battles and a fourth pet — and a screen lock, held on Cancel for three seconds."

  # The Community Edition draws far more sprites (menu icons, the extra
  # actions, the Panda pet), so it needs its own, larger asset set.
  [badge.firmware.assets]
  file = "/assets/cyber-aegg/cyber-aegg-community-assets.zip"
  sha256 = "992fee1ed791be4e65fe1e0b56553be1880546f3a5fd1bce5cb984ee43e36fb9"
  label = "265 files — everything the standard set has, plus the Community Edition's menu icons, extra action sprites and the Panda pet."

  [[badge.firmware]]
  label = "DOOM"
  # Built with `make -f Makefile.doom` in rarenerd/cyberaegg-doom,
  # from main @ dbad849 (2026-07-21). Links at 0x10000 like the others.
  file = "/firmware/cyber-aegg/cyber-aegg-doom.bin"
  sha256 = "c470cc78b6bf70348c0cd3f0f56e5c9e729867d16c91bfd8d06f18e36d8a4161"
  notes = "DOOM E1M1, rendered on the e-paper panel at a couple of frames per second, with the level's music on the buzzer. Flashing this is only half the job: the game data is far too big for the USB drive, so you have to upload a WAD separately before DOOM will start. It also replaces the badge firmware — no BornPets, mesh or clock until you flash one of those back, though your pet and settings survive in flash."
  # Rendered as a link under the notes, and in place of the asset step.
  moreUrl = "../doom/"
  moreLabel = "How to upload the WAD →"
  nextStep = "DOOM keeps its game data in the badge's QSPI flash, not on the USB drive, so there is nothing to copy here. It is uploaded over a serial connection instead — and until you do that, the badge has no game to run."
  # No `assets` table: DOOM ignores the FAT12 drive. Its game data lives in
  # the 2 MB QSPI flash and is uploaded separately over serial, so the asset
  # step hides itself for this image.
  wad = true

  [[badge.firmware]]
  label = "CircuitPython"
  # Prebuilt image from https://codeberg.org/rarenerd/cyberaegg-circuitpython
  # (firmware/cyberaegg-circuitpython.bin @ 23bdac4); the hash matches that
  # repository's own firmware/SHA256SUMS.
  file = "/firmware/cyber-aegg/cyberaegg-circuitpython.bin"
  sha256 = "c062f8ac7772275594fea8ffef1c9dbf2984f77a814a6a80356a277753ec4fa7"
  notes = "Write badge programs in Python, with no toolchain at all: the badge mounts as a CIRCUITPY drive and runs code.py every time you save it. The display, buttons, LEDs, buzzer, battery, LoRa and NFC are all exposed as ordinary CircuitPython modules. Bluetooth is not, and it replaces the badge firmware — no BornPets, mesh or clock until you flash one of those back."
  moreUrl = "../circuitpython/"
  moreLabel = "Getting started with CircuitPython →"
  # Support libraries for the CIRCUITPY drive. Declared as this image's asset
  # payload so the flasher offers them at step 5 like any other, and repeated
  # as `pylib` below for the installer on the CircuitPython page.
  #
  # `drive` names the volume to pick. CircuitPython's is not the badge's own
  # CYBR volume: that one only exists in DFU mode, while CIRCUITPY appears
  # once the badge has been reset into the new firmware.
  [badge.firmware.assets]
  file = "/assets/cyber-aegg/cyberaegg-circuitpython-lib.zip"
  sha256 = "8905601ff13fa069770ded3a6007a96f2e88475e7f31714a46fc41d5bd734bf5"
  label = "8 files — the e-paper and LoRa drivers, plus adafruit_display_text for drawing labels."
  drive = "CIRCUITPY"
  intro = "CircuitPython needs its support libraries before any of the examples will run. They go in a lib folder on the CIRCUITPY drive, which appears once you have flashed the firmware and reset the badge — it is not the CYBR drive you flashed from."

  # Support libraries for the CIRCUITPY drive, offered by the installer on
  # ../circuitpython/. Unlike the badge's own asset archives this one has
  # structure — it carries lib/ and lib/adafruit_display_text/ — so the paths
  # are preserved on extraction rather than flattened.
  #
  # Built from the repository root so the paths come out right:
  #   zip -rX -9 <out>.zip lib
  [badge.firmware.pylib]
  file = "/assets/cyber-aegg/cyberaegg-circuitpython-lib.zip"
  sha256 = "8905601ff13fa069770ded3a6007a96f2e88475e7f31714a46fc41d5bd734bf5"
  label = "The e-paper and LoRa drivers, plus adafruit_display_text for drawing labels."

# Prepared WAD blobs offered by the loader at ../doom/. Users can always pick
# a file of their own instead; these are a convenience so nobody has to run
# the asset pipeline at camp.
#
# The blob is *derived* from the freely distributable DOOM shareware episode
# (trimmed and compressed to fit 2 MB of QSPI) — see
# LICENSES/LicenseRef-DoomShareware.txt. Do not add blobs built from the
# commercial episodes or from doom2.wad.
[[badge.wads]]
label = "DOOM shareware — E1M1, Knee-Deep in the Dead"
file = "/doom/cyber-aegg/e1m1.blob"
size = 1921948
sha256 = "7fef28876b45cef0563761ca26df0a1cc989e7d20c32f09d71273bbd5df75115"
notes = "Built from the shareware doom1.wad with the CyberAegg asset pipeline. Roughly 1.8 MiB — about 92% of the badge's QSPI flash, which is why only one level fits."

# Note: do NOT list `cyber-aegg-full.bin` here. That image starts at
# 0x00000000 and contains the bootloader; it is an SWD / J-Link recovery
# image. DFU writes the application partition only, so flashing the full
# image over DFU would brick the badge.
